# =============================================
# STEP 1: Application Configuration
# =============================================
# This file is where you configure your Spring Boot application.
# Spring Boot reads this file automatically at startup.
# Every property here controls some behavior of your app.

# ---- DATABASE CONNECTION ----
# The JDBC URL tells Java how to connect to your MySQL database
# Format: jdbc:mysql://HOST:PORT/DATABASE_NAME?options
# Change "demo_db" to your database name
spring.datasource.url=jdbc:mysql://localhost:3306/demo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Your MySQL username and password (change these to match your MySQL setup)
spring.datasource.username=root
spring.datasource.password=

# ---- JPA / HIBERNATE SETTINGS ----
# ddl-auto=update → Hibernate will CREATE or ALTER tables to match your entities
#   - "update" is great for development (auto-creates tables)
#   - In production, use "validate" or "none" and manage DB changes with migrations
spring.jpa.hibernate.ddl-auto=update

# show-sql=true → prints every SQL query in the console (helpful for learning!)
spring.jpa.show-sql=true

# format_sql=true → makes the printed SQL readable (indented, multi-line)
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate which MySQL version/dialect to use for generating SQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ---- SERVER SETTINGS ----
# The port your app runs on (default is 8080)
# Uncomment the next line to change it
# server.port=8080
